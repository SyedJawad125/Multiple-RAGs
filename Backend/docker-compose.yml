#   static_data:    # persists collected static files between restarts



services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ  (Celery broker) ──────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django web server ──────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "120", "config.wsgi:application"]
    volumes:
      # ✅ Only mount data directories — NOT the entire source tree
      # Mounting .:/app would overwrite the built image with Windows files
      - chroma_data:/app/chroma_db
      - media_data:/app/media
      - static_data:/app/static
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Celery worker ──────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency=4"]
    volumes:
      - chroma_data:/app/chroma_db
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Celery Beat ────────────────────────────────────────────────
  beat:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Adminer  (DB UI → http://localhost:8081) ───────────────────
  adminer:
    image: adminer
    container_name: adminer_AI_Resume_Screener
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
  media_data:
  static_data: